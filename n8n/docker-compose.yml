version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
      # Daten persistent speichern
      - N8N_USER_FOLDER=/home/node/.n8n
      # Basic Auth für lokalen Zugang (optional aber empfohlen)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=kita-connect-local
      # Credentials verschlüsseln
      - N8N_ENCRYPTION_KEY=kita-connect-encryption-key-change-in-prod
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - kita-network

volumes:
  n8n_data:
    driver: local

networks:
  kita-network:
    driver: bridge
